services:
  hardhat-node:
    build:
      context: ./contracts
      dockerfile: Dockerfile
    working_dir: /app
    command: ["sh", "/app/docker/node.sh"]
    ports:
      - "8545:8545"
    volumes:
      - ./contracts:/app
      - contracts_node_modules:/app/node_modules
      - contracts_cache:/app/cache
      - contracts_artifacts:/app/artifacts
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8545',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',method:'eth_chainId',params:[],id:1})}).then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - vault-network

  contract-deployer:
    build:
      context: ./contracts
      dockerfile: Dockerfile
    working_dir: /app
    command: ["sh", "/app/docker/deploy.sh"]
    environment:
      LOCALHOST_RPC_URL: http://hardhat-node:8545
      DEPLOYMENT_OUTPUT_DIR: /deployment
    depends_on:
      hardhat-node:
        condition: service_healthy
    volumes:
      - ./contracts:/app
      - contracts_node_modules:/app/node_modules
      - contracts_cache:/app/cache
      - contracts_artifacts:/app/artifacts
      - vault_deployment:/deployment
    restart: "no"
    networks:
      - vault-network

  vault-exporter:
    build:
      context: ./monitoring/exporter
      dockerfile: Dockerfile
    working_dir: /app
    command: ["sh", "/app/docker/start.sh"]
    environment:
      RPC_URL: http://hardhat-node:8545
      DEPLOYMENT_FILE: /deployment/deployment.json
      PORT: 8080
      METRICS_INTERVAL: 10
    depends_on:
      hardhat-node:
        condition: service_healthy
      contract-deployer:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./monitoring/exporter:/app
      - exporter_node_modules:/app/node_modules
      - vault_deployment:/deployment:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - vault-network

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      vault-exporter:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--quiet",
          "http://127.0.0.1:9090/-/healthy"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - vault-network

  grafana:
    image: grafana/grafana:12.1.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--quiet",
          "http://127.0.0.1:3000/api/health"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - vault-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: ["sh", "/app/docker/start.sh"]
    environment:
      DEPLOYMENT_FILE: /deployment/deployment.json
      VITE_LOCAL_RPC_URL: http://localhost:8545
      VITE_WALLETCONNECT_PROJECT_ID: YOUR_PROJECT_ID
    depends_on:
      contract-deployer:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - vault_deployment:/deployment:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - vault-network

volumes:
  contracts_node_modules:
  contracts_cache:
  contracts_artifacts:
  exporter_node_modules:
  frontend_node_modules:
  grafana_data:
  prometheus_data:
  vault_deployment:

networks:
  vault-network:
    driver: bridge
